<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to top left, #270d3e, #381a3a);
            color: #f4e8ff;
            background-attachment: fixed; /* Keeps gradient still while scrolling */
            min-height: 100vh;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .secondsectiOn {
            background: rgba(44, 16, 68, 0.4); 
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(222, 184, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            color: #f4e8ff;
        }

        h1 {
            font-family: 'Racing Sans One', sans-serif;
            font-size: 3rem;
            margin-bottom: 20px;
        }

        p {
            line-height: 1.6;
            font-size: 1.1rem;
        }
    </style>
</head>

<body>
    <main>
        <h1>About us</h1>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Quod delectus officia cumque adipisci cupiditate
            fugit sequi hic est? Cumque modi repellendus assumenda sed numquam vel nostrum non veniam ut ullam.</p>
    </main>
</body>

</html>
